<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style.css">

<body>
    <div class="container">
    <div class="output" type="input"></div>
     <!-- <input type="text" class="output" readonly> -->
    <div class="input-collector">
        <div class="first">
            <div class="zero btn">0</div>
            <div class="three btn">3</div>
            <div class="six btn">6</div>
            <div class="nine btn">9</div>
        </div>
        <div class="second">
            <div class="one btn">1</div>
            <div class="four btn">4</div>
            <div class="seven btn">7</div>
            <div class="multiply btn">*</div>
        </div>
        <div class="third">
            <div class="two btn">2</div>
            <div class="five btn">5</div>
            <div class="eight btn">8</div>
            <div class="AC btn">AC</div>
        </div>
        <div class="fourth">
            <div class="add btn">+</div>
            <div class="subtract btn">-</div>
            <div class="divide btn">/</div>
            <div class="equal btn">=</div>
        </div>
      
        <!-- <button tabindex="-1">Click Me</button> -->
    </div>
    <div class="last">
        <div class="delete btn">X</div>

    </div>
</div>
<script src="script.js"></script>
</body>

</html>
